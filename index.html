<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星際航班 · 報名</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple-light: #EEEDFE;
    --purple-mid: #AFA9EC;
    --purple: #7F77DD;
    --purple-dark: #534AB7;
    --purple-deeper: #3C3489;
    --text: #1a1a2e;
    --text-muted: #6b6b8a;
    --text-faint: #9999b3;
    --border: rgba(127,119,221,0.2);
    --bg: #fafafa;
    --surface: #ffffff;
    --surface2: #f5f4fc;
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  .page { max-width: 480px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  /* Header */
  .header { text-align: center; padding: 2rem 0 2.5rem; }
  .sigil-wrap { margin: 0 auto 1.5rem; width: 72px; height: 72px; position: relative; }
  .sigil-wrap svg { width: 100%; height: 100%; animation: sigil-rotate 20s linear infinite; }
  @keyframes sigil-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .title-en { font-family: 'Noto Serif TC', serif; font-size: 11px; letter-spacing: 0.3em; color: var(--purple); text-transform: uppercase; margin-bottom: 8px; }
  .title-zh { font-family: 'Noto Serif TC', serif; font-size: 28px; font-weight: 300; color: var(--text); letter-spacing: 0.15em; margin-bottom: 10px; }
  .tagline { font-size: 12px; color: var(--text-muted); line-height: 1.8; letter-spacing: 0.05em; }

  /* Info strip */
  .info-strip { display: flex; flex-direction: column; gap: 6px; background: var(--surface2); border: 0.5px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 2rem; }
  .info-item { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-muted); }
  .info-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--purple); flex-shrink: 0; }

  /* Section */
  .section { margin-bottom: 2rem; }
  .section-label { font-size: 11px; letter-spacing: 0.2em; color: var(--purple); text-transform: uppercase; margin-bottom: 12px; font-weight: 500; }

  /* Ticket */
  .ticket-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .ticket { border: 0.5px solid var(--border); border-radius: 12px; padding: 1.25rem 1rem; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--surface); }
  .ticket:hover { border-color: var(--purple-mid); background: var(--purple-light); }
  .ticket.selected { border: 1.5px solid var(--purple); background: var(--purple-light); }
  .ticket-type { font-size: 11px; color: var(--text-faint); margin-bottom: 8px; letter-spacing: 0.05em; }
  .ticket-price { font-family: 'Noto Serif TC', serif; font-size: 22px; font-weight: 400; color: var(--text); }
  .ticket.selected .ticket-price { color: var(--purple-deeper); }
  .ticket-unit { font-size: 11px; color: var(--text-faint); margin-top: 4px; }

  /* Input */
  .field { margin-bottom: 10px; }
  input[type="text"], input[type="email"], input[type="tel"] {
    width: 100%; padding: 12px 14px;
    border: 0.5px solid var(--border);
    border-radius: 10px; font-size: 14px;
    background: var(--surface); color: var(--text);
    outline: none; transition: border-color 0.2s;
    font-family: 'Noto Sans TC', sans-serif;
  }
  input::placeholder { color: var(--text-faint); }
  input:focus { border-color: var(--purple); }

  /* Companion */
  .companion { display: none; }
  .companion.show { display: block; }
  .companion-inner { background: var(--surface2); border-radius: 10px; padding: 1rem; margin-top: 10px; }
  .companion-label { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }

  /* Divider */
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 2rem 0; }

  /* Oil */
  .oil-box { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.5rem; }
  .oil-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .oil-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--purple); }
  .oil-box-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .oil-desc { font-size: 12px; color: var(--text-muted); line-height: 1.8; margin-bottom: 1.25rem; }
  .draw-btn { width: 100%; padding: 12px; border: 0.5px solid var(--purple-mid); border-radius: 10px; background: white; color: var(--purple-dark); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans TC', sans-serif; letter-spacing: 0.05em; }
  .draw-btn:hover { background: var(--purple-light); border-color: var(--purple); }
  .draw-btn:disabled { opacity: 0.6; cursor: default; }

  .oil-result { display: none; margin-top: 1.25rem; }
  .oil-result.show { display: block; }
  .oil-card { background: white; border: 0.5px solid var(--border); border-radius: 10px; padding: 1.25rem; text-align: center; }
  .oil-emoji { font-size: 28px; margin-bottom: 8px; }
  .oil-name { font-family: 'Noto Serif TC', serif; font-size: 18px; color: var(--text); margin-bottom: 6px; }
  .oil-meaning { font-size: 12px; color: var(--text-muted); line-height: 1.8; }
  .oil-footnote { font-size: 11px; color: var(--text-faint); margin-top: 10px; font-style: italic; }

  /* Payment */
  .payment-box { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.5rem; }
  .payment-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .payment-row:last-child { margin-bottom: 0; }
  .pay-label { font-size: 12px; color: var(--text-muted); }
  .pay-value { font-size: 13px; font-weight: 500; color: var(--text); letter-spacing: 0.03em; }
  .copy-btn { font-size: 11px; color: var(--purple-dark); border: 0.5px solid var(--purple-mid); background: white; padding: 3px 10px; border-radius: 6px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s; }
  .copy-btn:hover { background: var(--purple-light); }
  .pay-total-row { border-top: 0.5px solid
